# CodeIgniter 4 — yasti.site
# Copy ke: /etc/nginx/sites-available/yasti.site
# Symlink: ln -s /etc/nginx/sites-available/yasti.site /etc/nginx/sites-enabled/
# Test: nginx -t && systemctl reload nginx
#
# PENTING: root HARUS folder public/, bukan root project!

server {
    listen 80;
    listen [::]:80;
    server_name yasti.site www.yasti.site;
    return 301 https://yasti.site$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.yasti.site;

    ssl_certificate     /etc/letsencrypt/live/yasti.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yasti.site/privkey.pem;

    return 301 https://yasti.site$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name yasti.site;

    root /var/www/porto/public;
    index index.php;

    ssl_certificate     /etc/letsencrypt/live/yasti.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yasti.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 4M;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param CI_ENVIRONMENT production;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|webp|svg|ico|woff2?)$ {
        expires 7d;
        access_log off;
        try_files $uri =404;
    }

    location ^~ /uploads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=604800";
    }

    location ~ /\. {
        deny all;
    }

    location ~ ^/(app|vendor|writable|tests|env)/ {
        deny all;
    }
}
